name: zongo-development

x-app-environment: &app-environment
  NODE_ENV: ${NODE_ENV:-production}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: '5432'
  POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}

x-infrastructure-depends-on: &infrastructure-depends-on
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

x-app-depends-on: &app-depends-on
  <<: *infrastructure-depends-on
  migrate:
    condition: service_completed_successfully

x-app-service: &app-service
  image: ${ZONGO_IMAGE:?ZONGO_IMAGE is required}:${ZONGO_IMAGE_TAG:?ZONGO_IMAGE_TAG is required}
  restart: unless-stopped
  depends_on: *app-depends-on
  environment: *app-environment
  networks:
    - default
    - coolify

services:
  api:
    <<: *app-service
    command: ['node', 'dist/apps/api/main']
    environment:
      <<: *app-environment
      PORT: '3000'
    expose:
      - '3000'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.zongo-dev-api.rule=Host(`${API_HOSTNAME:?API_HOSTNAME is required}`)'
      - 'traefik.http.routers.zongo-dev-api.entrypoints=websecure'
      - 'traefik.http.routers.zongo-dev-api.tls=true'
      - 'traefik.http.services.zongo-dev-api.loadbalancer.server.port=3000'
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -fsS http://localhost:3000/health/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    <<: *app-service
    command: ['node', 'dist/apps/worker/main']
    environment:
      <<: *app-environment
      PORT: '3001'
    expose:
      - '3001'
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -fsS http://localhost:3001/health/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  admin:
    <<: *app-service
    command: ['node', 'dist/apps/admin/apps/admin/src/main.js']
    environment:
      <<: *app-environment
      PORT: '3002'
      BREAK_GLASS_SECRET: ${BREAK_GLASS_SECRET:?BREAK_GLASS_SECRET is required}
      ADMINJS_COOKIE_SECRET: ${ADMINJS_COOKIE_SECRET:?ADMINJS_COOKIE_SECRET is required}
      ADMIN_ALERT_WEBHOOK_URL: ${ADMIN_ALERT_WEBHOOK_URL:-}
      # AdminJS defaults to a relative .adminjs directory; use a writable,
      # absolute container path because Coolify does not guarantee the CWD.
      ADMIN_JS_TMP_DIR: /tmp/adminjs
    expose:
      - '3002'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.zongo-dev-admin.rule=Host(`${ADMIN_HOSTNAME:?ADMIN_HOSTNAME is required}`)'
      - 'traefik.http.routers.zongo-dev-admin.entrypoints=websecure'
      - 'traefik.http.routers.zongo-dev-admin.tls=true'
      - 'traefik.http.routers.zongo-dev-admin.middlewares=zongo-admin-vpn@file'
      - 'traefik.http.services.zongo-dev-admin.loadbalancer.server.port=3002'
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -fsS http://localhost:3002/health/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16.9-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres-development-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-bookworm
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--requirepass',
        '${REDIS_PASSWORD:?REDIS_PASSWORD is required}',
      ]
    volumes:
      - redis-development-data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'redis-cli --no-auth-warning -a "$$REDIS_PASSWORD" ping | grep -q PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

  migrate:
    image: ${ZONGO_IMAGE:?ZONGO_IMAGE is required}:${ZONGO_IMAGE_TAG:?ZONGO_IMAGE_TAG is required}
    command: ['pnpm', 'exec', 'prisma', 'migrate', 'deploy']
    restart: 'no'
    depends_on: *infrastructure-depends-on
    environment: *app-environment

volumes:
  postgres-development-data:
  redis-development-data:

networks:
  coolify:
    external: true
